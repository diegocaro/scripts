name: Test Scripts

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Discover and run scripts with --unit-tests
        run: |
          failed=0
          found=0

          while IFS= read -r script; do
            uv run "$script" --unit-tests
            exit_code=$?
            if [ $exit_code -eq 2 ]; then
              echo "SKIPPED: $script (--unit-tests not supported)"
            elif [ $exit_code -eq 0 ]; then
              found=$((found + 1))
              echo "PASSED: $script"
            else
              found=$((found + 1))
              echo "::error file=$script::Tests failed in $script"
              failed=$((failed + 1))
            fi
          done < <(find . -maxdepth 1 -name '*.py' | sort)

          echo "Ran unit tests in $found script(s), $failed failed."
          exit $failed
